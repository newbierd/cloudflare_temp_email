name = "cloudflare_temp_email"
main = "src/worker.ts"
compatibility_date = "2026-03-15"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[assets]
directory = "../frontend/dist/"
binding = "ASSETS"
run_worker_first = true

[vars]
PREFIX = "nb"
TITLE = "Newbie 临时邮箱"
DEFAULT_DOMAINS = ["newbie.ma"]
DOMAINS = ["newbie.ma", "niubi.ma", "niubie.de", "newbiee.de", "nmdd.de", "newbie.edu.kg"]
ENABLE_USER_CREATE_EMAIL = true
ENABLE_USER_DELETE_EMAIL = true
TG_ALLOW_USER_LANG = true
TG_MAX_ADDRESS = 5

[[d1_databases]]
binding = "DB"
database_name = "temp-mail-db"
database_id = "d7387fb5-10b8-4e89-93d8-d4180d1283a1"

[[kv_namespaces]]
binding = "KV"
id = "ec7819f8f1494d669d0c01e50e94c7a1"
